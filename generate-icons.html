<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<h2>JS App Icon Generator</h2>
<p>Klik tombol untuk generate semua icon, lalu save masing-masing.</p>
<div id="icons"></div>
<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];

sizes.forEach(size => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    // Background
    const gradient = ctx.createLinearGradient(0, 0, size, size);
    gradient.addColorStop(0, '#212121');
    gradient.addColorStop(1, '#3A3A3A');

    // Rounded rect
    const r = size * 0.2;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();

    // Text
    ctx.fillStyle = '#FFFFFF';
    ctx.font = `bold ${size * 0.45}px 'Arial Black', Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('JS', size / 2, size / 2);

    // Display
    const div = document.createElement('div');
    div.style.marginBottom = '16px';
    const link = document.createElement('a');
    link.href = canvas.toDataURL('image/png');
    link.download = `icon-${size}.png`;
    link.textContent = `Download icon-${size}.png`;
    link.style.display = 'block';
    div.appendChild(canvas);
    div.appendChild(link);
    document.getElementById('icons').appendChild(div);
});
</script>
</body>
</html>
